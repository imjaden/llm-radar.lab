<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Radar — 更新日志</title>
  <link rel="icon" href="static/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  (function(){
    var p=new URLSearchParams(window.location.search),t=p.get('t'),oh=3600000;
    if(!t||Date.now()-parseInt(t)>oh){p.set('t',Date.now());window.location.replace(window.location.pathname+'?'+p.toString()+(window.location.hash||''))}
  })();
  </script>
  <style>
    body{font-family:Inter,sans-serif;background:#0a0a14;color:#e0e0e0}
    .badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.6rem;font-weight:600}
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-lg font-bold text-white">📋 更新日志</h1>
      <div class="flex items-center gap-1 text-xs">
        <span class="text-gray-500">数据源</span>
        <div id="changelog-sources" class="flex items-center gap-1 flex-wrap"></div>
      </div>
      <a href="./" class="text-xs text-cobalt-400 hover:text-cobalt-300">← 返回仪表盘</a>
    </div>
    <p class="text-xs text-gray-500 mb-4" id="meta">加载中...</p>
    <div class="overflow-x-auto" id="table-wrap">
      <table class="w-full" id="log-table">
        <thead>
          <tr class="text-xs text-gray-500 uppercase">
            <th class="p-2 text-left">日期</th>
            <th class="p-2 text-left">类型</th>
            <th class="p-2 text-left">维度</th>
            <th class="p-2 text-left">摘要</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>
  <script>
  // Data sources (mirror from index.html)
  var SOURCES = [
    {name:'量子位', url:'https://www.qbitai.com'},
    {name:'机器之心', url:'https://www.jiqizhixin.com'},
    {name:'InfoQ', url:'https://www.infoq.cn/topic/AI'},
    {name:'36氪', url:'https://36kr.com/search/articles/大模型'},
    {name:'TechCrunch', url:'https://techcrunch.com/category/artificial-intelligence/'},
    {name:'GitHub', url:'https://github.com/trending'},
    {name:'HuggingFace', url:'https://huggingface.co/papers'},
  ];
  // Render source chips
  document.getElementById('changelog-sources').innerHTML = SOURCES.map(function(s) {
    return '<a href="' + s.url + '" target="_blank" rel="noopener" class="inline-block px-1.5 py-0.5 rounded bg-gray-800 text-gray-400 hover:text-cobalt-400 hover:bg-gray-700 text-xs whitespace-nowrap">' + s.name + '</a>';
  }).join(' ');

  fetch('data/snapshot.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){
    var log = d.changelog || [];
    var tbody = document.getElementById('log-body');
    var meta = document.getElementById('meta');
    meta.textContent = '数据更新时间: ' + (d.generated_at ? new Date(d.generated_at).toLocaleString('zh-CN') : '-') + ' · 共 ' + log.length + ' 条记录';
    var row, ctype, dim, summary, url, bg, ext, i;
    for(i = log.length - 1; i >= 0 && i >= log.length - 50; i--){
      ctype = log[i].type || '';
      dim = log[i].dimension || '';
      summary = log[i].summary || '';
      url = log[i].url || '';
      bg = ctype === 'new' ? 'bg-green-600' : ctype === 'update' ? 'bg-blue-600' : 'bg-red-600';
      ext = '';
      if(url && !/xxx|xxxx|example/.test(url)){
        ext = ' <a href="' + url + '" target="_blank" rel="noopener" class="text-cobalt-400 hover:text-cobalt-300">↗</a>';
      }
      row = document.createElement('tr');
      row.innerHTML = '<td class="p-2 border-b border-gray-800 text-xs text-gray-500 whitespace-nowrap">' + (log[i].date||'') + ' ' + (log[i].time||'') + '</td>' +
        '<td class="p-2 border-b border-gray-800"><span class="badge ' + bg + ' text-white text-xs">' + ctype + '</span></td>' +
        '<td class="p-2 border-b border-gray-800 text-xs text-gray-400">' + dim + '</td>' +
        '<td class="p-2 border-b border-gray-800 text-xs text-white"><a href="./#tab=' + dim + '" class="hover:text-cobalt-400">' + summary + '</a>' + ext + '</td>';
      tbody.appendChild(row);
    }
    if(!log.length){
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-gray-500 py-8 text-sm">暂无记录</td></tr>';
    }
  }).catch(function(e){
    document.getElementById('meta').textContent = '❌ 加载失败: ' + e.message;
  });
  </script>
</body>
</html>
