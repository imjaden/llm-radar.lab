<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self';">
  <title>LLM Radar — 更新日志</title>
  <link rel="icon" href="static/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  (function(){
    var p=new URLSearchParams(window.location.search),t=p.get('t'),oh=3600000;
    if(!t||Date.now()-parseInt(t)>oh){p.set('t',Date.now());window.location.replace(window.location.pathname+'?'+p.toString()+(window.location.hash||''))}
  })();
  </script>
  <style>
    body{font-family:Inter,-apple-system,sans-serif;background:#0a0a14;color:#e0e0e0}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.65rem;font-weight:600;text-transform:uppercase}
    .row-new{border-left:3px solid #22c55e}
    .row-update{border-left:3px solid #3b82f6}
    .heat-up{color:#f59e0b}
    .heat-down{color:#ef4444}
    .arrow-up::before{content:'↑ '}
    .arrow-down::before{content:'↓ '}
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-lg font-bold text-white">📋 更新日志</h1>
      <div class="flex items-center gap-1 text-xs">
        <span class="text-gray-500">数据源</span>
        <div id="changelog-sources" class="flex items-center gap-1 flex-wrap"></div>
      </div>
      <a href="./" class="text-xs text-cobalt-400 hover:text-cobalt-300">← 返回</a>
    </div>
    <p class="text-xs text-gray-500 mb-4" id="meta">加载中...</p>
    <div class="space-y-3" id="log-list"></div>
  </div>

  <script>
  var SOURCES = [
    {name:'量子位', url:'https://www.qbitai.com'},
    {name:'机器之心', url:'https://www.jiqizhixin.com'},
    {name:'InfoQ', url:'https://www.infoq.cn/topic/AI'},
    {name:'36氪', url:'https://36kr.com/search/articles/大模型'},
    {name:'TechCrunch', url:'https://techcrunch.com/category/artificial-intelligence/'},
    {name:'GitHub', url:'https://github.com/trending'},
    {name:'HuggingFace', url:'https://huggingface.co/papers'},
  ];
  document.getElementById('changelog-sources').innerHTML = SOURCES.map(function(s) {
    return '<a href="'+s.url+'" target="_blank" rel="noopener" class="inline-block px-1.5 py-0.5 rounded bg-gray-800 text-gray-400 hover:text-cobalt-400 hover:bg-gray-700 text-xs whitespace-nowrap">'+s.name+'</a>';
  }).join(' ');

  function safeUrl(url) {
    if (!url) return null;
    if (/^https:\/\/.+/.test(url)) return url;
    return null;
  }

  function heatClass(oldScore, newScore) {
    var d = newScore - oldScore;
    if (d > 0) return 'heat-up arrow-up';
    if (d < 0) return 'heat-down arrow-down';
    return '';
  }

  fetch('data/snapshot.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){
    var log = d.changelog || [];
    var list = document.getElementById('log-list');
    var meta = document.getElementById('meta');
    meta.textContent = '数据更新时间: ' + (d.generated_at ? new Date(d.generated_at).toLocaleString('zh-CN') : '-') + ' · 最近 50 条记录';

    var i, item, ctype, dim, name, dimLabel, summary, url, href, bg, rowClass;
    var count = 0;
    for (i = log.length - 1; i >= 0 && count < 50; i--, count++) {
      item = log[i];
      ctype = item.type || '';
      dim = item.dimension || '';
      name = item.name || item.id || '?';
      dimLabel = item.dim_label || item.dimension || '?';
      summary = item.summary || '';
      url = item.url || '';
      href = safeUrl(url);

      bg = ctype === 'new' ? 'bg-green-600' : ctype === 'update' ? 'bg-blue-600' : 'bg-red-600';
      rowClass = ctype === 'new' ? 'row-new' : 'row-update';

      var card = document.createElement('div');
      card.className = 'bg-gray-900 rounded p-3 ' + rowClass;

      // Row 1: date, type badge, dim label, entity name
      var row1 = document.createElement('div');
      row1.className = 'flex items-center gap-2 mb-1.5 flex-wrap';

      var dateSpan = document.createElement('span');
      dateSpan.className = 'text-xs text-gray-500';
      dateSpan.textContent = (item.date||'') + ' ' + (item.time||'');
      row1.appendChild(dateSpan);

      var badge = document.createElement('span');
      badge.className = 'badge ' + bg + ' text-white';
      badge.textContent = ctype;
      row1.appendChild(badge);

      var dimSpan = document.createElement('span');
      dimSpan.className = 'text-xs text-gray-400';
      dimSpan.textContent = dimLabel;
      row1.appendChild(dimSpan);

      var nameSpan = document.createElement('span');
      nameSpan.className = 'text-sm font-semibold text-white';
      var nameLink = document.createElement('a');
      nameLink.href = './#tab=' + dim + '&focus=' + (item.id||'');
      nameLink.className = 'text-white hover:text-cobalt-300 underline decoration-dotted underline-offset-2';
      nameLink.textContent = name;
      nameSpan.appendChild(nameLink);
      row1.appendChild(nameSpan);

      card.appendChild(row1);

      // Row 2: summary text
      var sumDiv = document.createElement('div');
      sumDiv.className = 'text-xs text-gray-300 leading-relaxed';
      sumDiv.textContent = summary;
      card.appendChild(sumDiv);

      // Row 3: source link
      if (href) {
        var srcDiv = document.createElement('div');
        srcDiv.className = 'text-xs text-gray-600 mt-1';
        srcDiv.textContent = '来源: ';
        var srcLink = document.createElement('a');
        srcLink.href = href;
        srcLink.target = '_blank';
        srcLink.rel = 'noopener noreferrer';
        srcLink.className = 'text-cobalt-400 hover:text-cobalt-300';
        srcLink.textContent = '↗';
        srcDiv.appendChild(srcLink);
        card.appendChild(srcDiv);
      }

      list.appendChild(card);
    }
    if (!count) {
      list.innerHTML = '<div class="text-center text-gray-500 py-8 text-sm">暂无记录</div>';
    }
  }).catch(function(e){
    document.getElementById('meta').textContent = '❌ 加载失败: ' + e.message;
  });
  </script>
</body>
</html>
